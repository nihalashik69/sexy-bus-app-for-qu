name: qu_bus_driver
description: "QU Bus Driver App - Real-time location tracking for campus buses"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Location services
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  
  # HTTP requests
  http: ^1.1.0
  
  # Firebase
  firebase_core: ^4.2.0
  firebase_database: ^12.0.3
  
  # State management
  provider: ^6.1.5+1
  
  # Background tasks
  flutter_background_service: ^5.0.5
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # UI components
  flutter_launcher_icons: ^0.13.1
  
  # Permissions
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
